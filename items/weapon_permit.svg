<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5d1a1a"/>
      <stop offset="100%" style="stop-color:#7c2424"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9a7218"/>
      <stop offset="50%" style="stop-color:#e0b840"/>
      <stop offset="100%" style="stop-color:#9a7218"/>
    </linearGradient>
    <linearGradient id="holo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   style="stop-color:#caa64b;stop-opacity:0.4"/>
      <stop offset="50%"  style="stop-color:#ef9a9a;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#caa64b;stop-opacity:0.4"/>
    </linearGradient>
  </defs>

  <!-- Card body -->
  <rect x="4" y="16" width="120" height="96" rx="8" ry="8" fill="url(#bg)"/>

  <!-- Gold stripe top -->
  <rect x="4" y="16" width="120" height="6" rx="4" ry="4" fill="url(#gold)" opacity="0.9"/>

  <!-- Gold stripe bottom -->
  <rect x="4" y="106" width="120" height="6" rx="4" ry="4" fill="url(#gold)" opacity="0.9"/>

  <!-- Hologram corner -->
