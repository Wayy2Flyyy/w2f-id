  <text x="46" y="60" font-size="4" fill="#bc9090" font-family="sans-serif">LAST NAME / FIRST NAME</text>
  <rect x="46" y="62" width="70" height="1.5" rx="0.5" fill="#caa64b" opacity="0.4"/>

  <text x="46" y="72" font-size="4" fill="#bc9090" font-family="sans-serif">DATE OF BIRTH</text>
