    <rect x="35.5" y="86" width="1" height="10"/>
    <rect x="38" y="86" width="1.5" height="10"/>
    <rect x="41" y="86" width="2.5" height="10"/>
    <rect x="45" y="86" width="1" height="10"/>
    <rect x="47.5" y="86" width="2" height="10"/>
    <rect x="51" y="86" width="1.5" height="10"/>
    <rect x="54" y="86" width="1" height="10"/>
    <rect x="56.5" y="86" width="2.5" height="10"/>
    <rect x="60.5" y="86" width="1" height="10"/>
    <rect x="63" y="86" width="2" height="10"/>
    <rect x="66.5" y="86" width="1.5" height="10"/>
    <rect x="69.5" y="86" width="1" height="10"/>
    <rect x="72" y="86" width="2" height="10"/>
    <rect x="75.5" y="86" width="1" height="10"/>
    <rect x="78" y="86" width="1.5" height="10"/>
    <rect x="81" y="86" width="2.5" height="10"/>
    <rect x="85" y="86" width="1" height="10"/>
    <rect x="87.5" y="86" width="2" height="10"/>
    <rect x="91" y="86" width="1.5" height="10"/>
    <rect x="94" y="86" width="1" height="10"/>
    <rect x="96.5" y="86" width="2.5" height="10"/>
    <rect x="100.5" y="86" width="1" height="10"/>
    <rect x="103" y="86" width="2" height="10"/>
