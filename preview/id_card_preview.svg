<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 580" width="920" height="580">
  <defs>
    <linearGradient id="screenbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1a"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="cardbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16335e"/>
      <stop offset="100%" style="stop-color:#1f4a8c"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#b08a2e"/>
      <stop offset="50%" style="stop-color:#f0d878"/>
      <stop offset="100%" style="stop-color:#b08a2e"/>
    </linearGradient>
    <linearGradient id="holo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   style="stop-color:#b08a2e;stop-opacity:0.5"/>
      <stop offset="40%"  style="stop-color:#4fc3f7;stop-opacity:0.4"/>
      <stop offset="70%"  style="stop-color:#ce93d8;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#b08a2e;stop-opacity:0.5"/>
    </linearGradient>
    <linearGradient id="guillocheV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#3a6ba8;stop-opacity:0.08"/>
      <stop offset="50%"  style="stop-color:#3a6ba8;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#3a6ba8;stop-opacity:0.08"/>
    </linearGradient>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#000" flood-opacity="0.6"/>
    </filter>
    <clipPath id="cardClip">
      <rect x="230" y="140" width="460" height="300" rx="16" ry="16"/>
    </clipPath>
  </defs>

